<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
</head>
<body>
    <h1>Регистрация</h1>
    <form method="post" action="{% url 'shop:register_submit' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Зарегистрироваться</button>
    </form>
    <p><a href="{% url 'shop:login' %}">Уже есть аккаунт? Войти</a></p>
    <p><a href="{% url 'shop:home' %}">На главную</a></p>
</body>
</html>
