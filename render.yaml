services:
  - type: web
    name: mimosa-webshop
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn mimosa_backend.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.2
      - key: DJANGO_SETTINGS_MODULE
        value: mimosa_backend.settings
      - key: DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
